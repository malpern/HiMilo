name: VoxClawMac
options:
  bundleIdPrefix: com.malpern
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"

packages:
  VoxClawCore:
    path: ../

targets:
  VoxClaw:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "VoxClaw.help"
    resources:
      - path: Sources/VoxClaw.help
        buildPhase: none
    postBuildScripts:
      - script: |
          cp -R "${SRCROOT}/Sources/VoxClaw.help" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/VoxClaw.help"
        name: Copy Help Book
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.malpern.voxclaw
        PRODUCT_NAME: VoxClaw
        INFOPLIST_KEY_CFBundleDisplayName: VoxClaw
        INFOPLIST_KEY_LSUIElement: true
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: X2RKZ5TG99
        CODE_SIGN_ENTITLEMENTS: Sources/VoxClaw.entitlements
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
    dependencies:
      - package: VoxClawCore
        product: VoxClawCore

  VoxClaw AppStore:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "VoxClaw.help"
    resources:
      - path: Sources/VoxClaw.help
        buildPhase: none
    postBuildScripts:
      - script: |
          cp -R "${SRCROOT}/Sources/VoxClaw.help" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/VoxClaw.help"
        name: Copy Help Book
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.malpern.voxclaw
        PRODUCT_NAME: VoxClaw
        INFOPLIST_KEY_CFBundleDisplayName: VoxClaw
        INFOPLIST_KEY_LSUIElement: true
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: Sources/VoxClaw-AppStore.entitlements
        DEVELOPMENT_TEAM: X2RKZ5TG99
    dependencies:
      - package: VoxClawCore
        product: VoxClawCore
